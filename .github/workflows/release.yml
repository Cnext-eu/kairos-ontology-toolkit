name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create GitHub Release
  id-token: write   # PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Build package
        run: poetry build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # PyPI publishing disabled — trusted publisher not configured for this project.
  # To enable: configure OIDC at https://pypi.org/manage/project/kairos-ontology-toolkit/settings/publishing/
  # then uncomment the publish-pypi job below.
  #
  # publish-pypi:
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: ${{ !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-alpha.') }}
  #   environment: pypi
  #   steps:
  #     - name: Download artifacts
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist/
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-rc.* ]] || [[ "$TAG" == *-beta.* ]] || [[ "$TAG" == *-alpha.* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flags=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes \
            ${{ steps.prerelease.outputs.flags }}
