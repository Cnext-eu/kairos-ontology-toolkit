name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create GitHub Release
  id-token: write   # PyPI trusted publishing (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep '^__version__' src/kairos_ontology/__init__.py \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version:     $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch! Tag v$TAG but __version__ is $PKG_VERSION."
            echo "::error::Bump __version__ in src/kairos_ontology/__init__.py to match the tag."
            exit 1
          fi
          echo "✅ Version matches tag"

      - name: Verify CHANGELOG has an entry for the release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Pre-releases (rc/beta/alpha) are throwaway test builds — exempt.
          if [[ "$TAG" =~ (rc|beta|alpha) ]]; then
            echo "Pre-release $TAG — skipping CHANGELOG entry check."
            exit 0
          fi
          if ! grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}]' section."
            echo "::error::Promote the [Unreleased] section to a dated '## [${VERSION}]'"
            echo "::error::heading and commit it before tagging the release."
            exit 1
          fi
          echo "✅ CHANGELOG entry found for ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # PyPI publishing disabled — trusted publisher not configured for this project.
  # To enable: configure OIDC at https://pypi.org/manage/project/kairos-ontology-toolkit/settings/publishing/
  # then uncomment the publish-pypi job below.
  #
  # publish-pypi:
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: ${{ !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-alpha.') }}
  #   environment: pypi
  #   steps:
  #     - name: Download artifacts
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist/
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ (rc|beta|alpha) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "flags=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — uploading assets only"
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --generate-notes \
              ${{ steps.prerelease.outputs.flags }}
          fi
