# Auto-generated by kairos-ontology-toolkit — do not edit.
# When an issue is labeled 'copilot-implement', this workflow assigns the
# GitHub Copilot coding agent to automatically implement the requested change.
# The agent creates a draft PR for human review after implementation.

name: Assign Copilot Agent

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign-copilot:
    if: github.event.label.name == 'copilot-implement'
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to Copilot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-assignee "copilot"

      - name: Add acknowledgement comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "🤖 **Copilot agent assigned.** The coding agent will analyse this issue, implement the requested change on a \`copilot/\` branch, and open a **draft PR** for review. Please review the draft PR before merging."
