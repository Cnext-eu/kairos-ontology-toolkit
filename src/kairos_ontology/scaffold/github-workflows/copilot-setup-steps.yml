# Auto-generated by kairos-ontology-toolkit — do not edit.
# Configures the development environment for the GitHub Copilot coding agent.
# This workflow runs before Copilot starts working on an issue, ensuring it
# has Python, the kairos-ontology-toolkit, and all dependencies available
# to validate ontologies and run projections.

name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolkit and dependencies
        run: pip install -e .

      - name: Install Node.js (for Mermaid CLI SVG export)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          fi
