# Auto-generated by kairos-ontology-toolkit — do not edit.
# Tag-triggered workflow: runs projections, validates, and creates a GitHub
# Release with dbt + Power BI artifacts for downstream consumption.

name: Release Projections

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  project-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolkit
        run: pip install kairos-ontology-toolkit

      - name: Run projections (all targets)
        run: |
          kairos-ontology project \
            --ontologies ontology-hub/model/ontologies \
            --shapes ontology-hub/model/shapes \
            --target all

      - name: Validate ontologies
        run: |
          kairos-ontology validate \
            --ontologies ontology-hub/model/ontologies \
            --shapes ontology-hub/model/shapes

      - name: Package Power BI semantic model
        run: |
          if [ -d "ontology-hub/output/medallion/powerbi" ]; then
            cd ontology-hub/output/medallion/powerbi
            zip -r ../../../../powerbi-semantic-model.zip .
            echo "POWERBI_PACKAGE=true" >> "$GITHUB_ENV"
          else
            echo "POWERBI_PACKAGE=false" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ASSETS=""
          if [ "$POWERBI_PACKAGE" = "true" ]; then
            ASSETS="powerbi-semantic-model.zip"
          fi
          gh release create "$TAG" $ASSETS \
            --title "$TAG" \
            --generate-notes
